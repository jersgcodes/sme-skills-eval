  document.getElementById('f').addEventListener('submit', function(ev){
    ev.preventDefault(); unlock(document.getElementById('p').value, false);
  });
  var saved = sessionStorage.getItem('sgsme_pp');
  if(saved){ unlock(saved, true); }
</script>
