  var ITER = 250000;
  function b2u(s){return Uint8Array.from(atob(s),function(c){return c.charCodeAt(0)})}
  async function decrypt(pass){
    var parts = PAYLOAD.split(':');
    var salt=b2u(parts[0]), iv=b2u(parts[1]), ct=b2u(parts[2]);
    var km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pass), 'PBKDF2', false, ['deriveKey']);
    var key = await crypto.subtle.deriveKey({name:'PBKDF2',salt:salt,iterations:ITER,hash:'SHA-256'}, km,
      {name:'AES-GCM',length:256}, false, ['decrypt']);
    var pt = await crypto.subtle.decrypt({name:'AES-GCM',iv:iv}, key, ct);
    return new TextDecoder().decode(pt);
  }
  async function unlock(pass, fromStore){
    try{
      var html = await decrypt(pass);
      sessionStorage.setItem('sgsme_pp', pass);
      document.open(); document.write(html); document.close();
    }catch(err){
      if(!fromStore){ document.getElementById('e').textContent='Incorrect passphrase. Try again.';
        document.getElementById('p').value=''; document.getElementById('p').focus(); }
    }
  }
  document.getElementById('f').addEventListener('submit', function(ev){
    ev.preventDefault(); unlock(document.getElementById('p').value, false);
  });
  var saved = sessionStorage.getItem('sgsme_pp');
  if(saved){ unlock(saved, true); }
